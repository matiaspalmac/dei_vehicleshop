<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dei Vehicle Shop</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-theme="dark" style="background:transparent!important">

  <!-- Dimmed Background Overlay -->
  <div class="shop-overlay" id="shop-overlay"></div>

  <!-- Main Container -->
  <div class="shop-container" id="shop-container">

    <!-- Header -->
    <div class="shop-header">
      <div class="shop-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M7 17m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"/>
          <path d="M17 17m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"/>
          <path d="M5 17h-2v-6l2-5h9l4 5h1a2 2 0 0 1 2 2v4h-2m-4 0h-6m-6 -6h15m-6 0v-5"/>
        </svg>
        <span id="shop-name">Concesionario</span>
        <div class="selling-badge" id="selling-badge">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <line x1="19" y1="8" x2="19" y2="14"/>
            <line x1="22" y1="11" x2="16" y2="11"/>
          </svg>
          Vendiendo a jugador
        </div>
      </div>
      <div class="header-right">
        <div class="search-container">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" class="search-input" id="search-input" placeholder="Buscar vehiculo...">
        </div>
        <select class="sort-dropdown" id="sort-dropdown">
          <option value="price-asc">Precio: Menor</option>
          <option value="price-desc">Precio: Mayor</option>
          <option value="name-asc">Nombre: A-Z</option>
          <option value="name-desc">Nombre: Z-A</option>
        </select>
        <div class="close-btn" id="close-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- Sidebar: Categories -->
    <div class="sidebar" id="sidebar">
      <!-- Category tabs rendered by JS -->
    </div>

    <!-- Main Content -->
    <div class="main-content" id="main-content">

      <!-- Vehicle Grid -->
      <div class="vehicle-grid-wrapper">
        <div class="grid-header">
          <span class="grid-count" id="grid-count">0 vehiculos</span>
        </div>
        <div class="vehicle-grid" id="vehicle-grid">
          <!-- Vehicle cards rendered by JS -->
        </div>
      </div>

      <!-- Detail Panel -->
      <div class="detail-panel" id="detail-panel">
        <div class="detail-empty" id="detail-empty">
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/>
            </svg>
            <p>Selecciona un vehiculo para ver los detalles</p>
          </div>
        </div>

        <!-- Detail Content (hidden initially) -->
        <div id="detail-content" style="display:none; flex-direction:column; gap:20px; flex:1;">

          <!-- Detail Header -->
          <div class="detail-header">
            <div class="detail-header-info">
              <div class="detail-title" id="detail-name">-</div>
              <div class="detail-subtitle">
                <span class="category-badge" id="detail-category">-</span>
                <span class="class-badge" id="detail-class">-</span>
                <span id="detail-seats" style="display:flex;align-items:center;gap:4px;">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                  </svg>
                  <span id="detail-seats-value">4</span>
                </span>
              </div>
            </div>
            <div class="detail-price" id="detail-price">$0</div>
          </div>

          <!-- Stats Grid -->
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-header">
                <span class="stat-label">Velocidad</span>
                <span class="stat-value" id="stat-speed">0</span>
              </div>
              <div class="stat-track">
                <div class="stat-fill" id="stat-speed-fill" style="width:0%; background:var(--accent-blue);"></div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-header">
                <span class="stat-label">Aceleracion</span>
                <span class="stat-value" id="stat-accel">0</span>
              </div>
              <div class="stat-track">
                <div class="stat-fill" id="stat-accel-fill" style="width:0%; background:var(--accent-green);"></div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-header">
                <span class="stat-label">Frenado</span>
                <span class="stat-value" id="stat-brake">0</span>
              </div>
              <div class="stat-track">
                <div class="stat-fill" id="stat-brake-fill" style="width:0%; background:var(--accent-red);"></div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-header">
                <span class="stat-label">Manejo</span>
                <span class="stat-value" id="stat-handling">0</span>
              </div>
              <div class="stat-track">
                <div class="stat-fill" id="stat-handling-fill" style="width:0%; background:var(--accent-yellow);"></div>
              </div>
            </div>
          </div>

          <!-- Info Rows -->
          <div class="detail-info">
            <div class="info-row">
              <span class="detail-label">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                  <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
                </svg>
                Categoria
              </span>
              <span class="detail-value" id="detail-cat-value">-</span>
            </div>
            <div class="info-row">
              <span class="detail-label">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                </svg>
                Clase
              </span>
              <span class="detail-value" id="detail-class-value">-</span>
            </div>
            <div class="info-row">
              <span class="detail-label">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="12" y1="1" x2="12" y2="23"/>
                  <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                </svg>
                Pago
              </span>
              <span class="detail-value" id="detail-pay-method">Banco</span>
            </div>
          </div>

          <!-- Action Buttons -->
          <div class="action-buttons" id="action-buttons">
            <button class="btn btn-test" id="btn-testdrive">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <polyline points="12 6 12 12 16 14"/>
              </svg>
              Test Drive
            </button>
            <button class="btn btn-primary" id="btn-buy">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="9" cy="21" r="1"/>
                <circle cx="20" cy="21" r="1"/>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
              </svg>
              Comprar
            </button>
            <button class="btn btn-secondary" id="btn-back">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"/>
                <polyline points="12 19 5 12 12 5"/>
              </svg>
              Cerrar
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Confirm Modal -->
  <div class="confirm-modal" id="confirm-modal">
    <div class="confirm-content">
      <div class="confirm-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1"/>
          <circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
      </div>
      <div class="confirm-title">Confirmar Compra</div>
      <div class="confirm-desc" id="confirm-desc">¿Comprar este vehiculo?</div>
      <div class="confirm-price" id="confirm-price">$0</div>
      <div class="confirm-buttons">
        <button class="btn btn-primary" id="btn-confirm-buy" style="flex:1;">Comprar</button>
        <button class="btn btn-secondary" id="btn-cancel-buy" style="flex:1;">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- Test Drive Timer -->
  <div class="test-drive-timer" id="test-drive-timer">
    <div class="timer-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
    </div>
    <div class="timer-info">
      <span class="timer-label">Test Drive</span>
      <span class="timer-value" id="timer-value">60s</span>
    </div>
    <span class="timer-vehicle" id="timer-vehicle">-</span>
  </div>

  <script src="assets/js/app.js"></script>
</body>
</html>
